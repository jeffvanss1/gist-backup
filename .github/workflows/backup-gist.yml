name: Backup Gist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download gist with timestamp
        run: |
          mkdir -p backups
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          curl -L "https://gist.githubusercontent.com/BestestCreature/53b495e6b30595283967c4817e33cfc0/raw/c936b11f716af48073dc56397d00bb1225747f6c" \
            -o "backups/gist-backup-${TIMESTAMP}.txt"
      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Backup gist: $(date -u)"
          git push
