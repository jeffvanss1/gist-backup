name: Backup Gist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Runs every hour

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Gist and Prepend Timestamp
        run: |
          mkdir -p backups
          # 1. Write the fresh timestamp to the file
          echo "Backup Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > backups/gist-backup.txt
          echo "==================================================" >> backups/gist-backup.txt
          
          # 2. Append the latest Gist content
          curl -sL "https://gist.githubusercontent.com/BestestCreature/53b495e6b30595283967c4817e33cfc0/raw/" >> backups/gist-backup.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/gist-backup.txt
          git commit -m "Update gist backup with timestamp"
          git push
